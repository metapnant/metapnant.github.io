<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>METAPNANT - Explore</title>
<link rel="icon" href="favicon.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet" />
<style>
:root {
  --name-color: #8541ff;
  --title-color: #ded4eb;
  --background-main: #0d0022;
  --primary-text-color: #f0f0f0;
  --secondary-text-color: #a09cb8;
}

/* FIX: Ensure the entire background is dark to eliminate the white bar */
html {
  background-color: var(--background-main);
}

/* dark animated gradient */
body {
  font-family: "Zilla Slab", serif;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  color: var(--primary-text-color);
  background: linear-gradient(
    135deg,
    #0b001f,
    #180033,
    #0d0022,
    #1c003a,
    #0b001f
  );
  background-size: 600% 600%;
  animation: darkShift 30s ease infinite;
  overflow-x: hidden;
}

@keyframes darkShift {
  0%   {background-position: 0% 50%;}
  25%  {background-position: 50% 50%;}
  50%  {background-position: 100% 50%;}
  75%  {background-position: 50% 50%;}
  100% {background-position: 0% 50%;}
}

/* Button pulse animation - synced to the 30s background rhythm */
@keyframes buttonGlow {
  0%   { box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); filter: brightness(100%); }
  25%  { box-shadow: 0 4px 25px rgba(133, 65, 255, 0.5); filter: brightness(110%); }
  50%  { box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); filter: brightness(100%); }
  75%  { box-shadow: 0 4px 25px rgba(133, 65, 255, 0.5); filter: brightness(110%); }
  100% { box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); filter: brightness(100%); }
}


.explore-container {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  flex-grow: 1;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1.2s ease, transform 1s ease;
}
body.loaded .explore-container {
  opacity: 1;
  transform: translateY(0);
}

.explore-header {
  text-align: center;
  margin-bottom: 30px;
  padding-top: 10px;
}

.explore-header h1 {
  color: var(--name-color);
  font-size: 2.8em;
  font-style: italic;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 1px;
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 1s ease, transform 1s ease;
}
body.loaded .explore-header h1 {
  opacity: 1;
  transform: translateY(0);
}

.explore-header .back-link {
  display: inline-block;
  margin-top: 10px;
  text-decoration: none;
  color: var(--title-color);
  border: 1px solid var(--title-color);
  padding: 8px 15px;
  border-radius: 20px;
  font-size: 0.9em;
  font-weight: 600;
  transition: background-color 0.3s, color 0.3s;
}
.explore-header .back-link:hover {
  background-color: var(--title-color);
  color: var(--background-main);
}

/* PDF container */
.pdf-container {
  position: relative;
  padding-top: 75%;
  overflow: hidden;
  border-radius: 8px;
  border: 2px solid var(--secondary-text-color);
  background-color: rgba(255, 255, 255, 0.03);
  opacity: 0;
  transform: scale(0.98);
  transition: opacity 1.2s ease, transform 1s ease;
}
body.loaded .pdf-container {
  opacity: 1;
  transform: scale(1);
}

.pdf-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* Fixed button with fade-in and new pulse animation */
.pdf-button {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 1000;
  background-color: var(--name-color);
  color: var(--background-main);
  text-decoration: none;
  font-weight: 600;
  padding: 12px 22px;
  border-radius: 30px;
  /* box-shadow is now managed by the animation */
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); /* Initial static shadow kept for load state */
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 1s ease, transform 1s ease, background-color 0.3s;
  animation: buttonGlow 30s ease infinite; /* New animation for the subtle pulse */
}
body.loaded .pdf-button {
  opacity: 1;
  transform: translateY(0);
}
.pdf-button:hover {
  background-color: #a678ff;
}

.footer {
  text-align: center;
  padding: 20px 0 10px 0;
  font-size: 0.85em;
  color: var(--secondary-text-color);
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  margin-top: 40px;
}

@media (max-width: 599px) {
  .pdf-container {
    padding-top: 130%;
  }
  .pdf-button {
    right: 10px;
    bottom: 10px;
    padding: 10px 18px;
    font-size: 0.9em;
  }
}
</style>
</head>
<body>
  <div class="explore-container">
    <header class="explore-header">
      <h1>METAPNANT</h1>
    </header>

    <main>
      <div class="pdf-container">
        <iframe
          src="A%20Story%20of%20Mirthful%20Reflection.pdf"
          title="A Story of Mirthful Reflection PDF"
        ></iframe>
      </div>
    </main>
  </div>

  <a
    href="A%20Story%20of%20Mirthful%20Reflection.pdf"
    target="_blank"
    class="pdf-button"
  >
    📖 Open Fullscreen / Download
  </a>

  <footer class="footer">
    <p> <span id="currentYear"></span> Tef Riin ∞ All rights reserved.</p>
  </footer>

  <script>
    document.getElementById("currentYear").textContent = new Date().getFullYear();
    window.addEventListener("load", () => {
      document.body.classList.add("loaded");
    });
  </script>
</body>
</html>
