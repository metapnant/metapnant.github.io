<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joachim Rayski - Resume</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 900px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }
        .resume-viewer {
            width: 100%;
            height: 75vh; /* Adjust as needed, 75% of viewport height */
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .actions {
            text-align: center;
            margin-bottom: 20px;
        }
        .actions button, .actions a {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 8px 5px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .actions button:hover, .actions a:hover {
            background-color: #2980b9;
        }
        .actions .share-btn {
            background-color: #2ecc71;
        }
        .actions .share-btn:hover {
            background-color: #27ae60;
        }
        .footer {
            margin-top: auto;
            padding: 15px;
            text-align: center;
            font-size: 0.9em;
            color: #777;
        }
        /* Basic responsive adjustments */
        @media (max-width: 600px) {
            .actions button, .actions a {
                display: block;
                width: 80%;
                margin: 10px auto;
            }
            .resume-viewer {
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Joachim Rayski's Resume</h1>

        <!-- PDF Viewer -->
        <!-- IMPORTANT: Change 'Joachim_Rayski_Resume.pdf' to your actual PDF filename -->
        <iframe src="Joachim_Rayski_Resume.pdf" class="resume-viewer" title="Joachim Rayski Resume">
            <p>Your browser does not support PDFs. Please download the PDF to view it.</p>
        </iframe>

        <!-- Action Buttons -->
        <div class="actions">
            <!-- IMPORTANT: Change 'Joachim_Rayski_Resume.pdf' to your actual PDF filename -->
            <a href="Joachim_Rayski_Resume.pdf" target="_blank" title="View PDF in a new tab">View Fullscreen</a>
            <a href="Joachim_Rayski_Resume.pdf" download="Joachim_Rayski_Resume.pdf" title="Download PDF">Download PDF</a>
            <button id="shareButton" class="share-btn" title="Copy link to clipboard">Share Link</button>
        </div>
    </div>

    <footer class="footer">
        <p>© <span id="currentYear"></span> Joachim Rayski. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        const shareButton = document.getElementById('shareButton');
        shareButton.addEventListener('click', () => {
            const urlToShare = window.location.href;
            navigator.clipboard.writeText(urlToShare).then(() => {
                alert('Link copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy link: ', err);
                alert('Could not copy link. Please copy it manually from the address bar.');
            });
        });
    </script>
</body>
</html>
