<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joachim Rayski - Resume</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px 0; /* Added some padding top and bottom */
            background-color: #1A0B2E; /* Dark Purple from card */
            color: #F5F5F5; /* Off-white for general text */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 90%;
            max-width: 900px;
            background-color: #2B1A4D; /* Slightly lighter dark purple for content box */
            padding: 25px;
            box-shadow: 0 0 20px rgba(190, 147, 253, 0.3); /* Subtle glow with accent purple */
            border-radius: 10px;
            text-align: center; /* Center align content within container */
        }
        .header h1 {
            color: #BE93FD; /* Accent Purple from card */
            font-size: 2.5em;
            margin-bottom: 5px;
            font-weight: 700;
        }
        .header p.subtitle {
            color: #D8BFD8; /* Lighter lavender for subtitle */
            font-size: 1.2em;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 400;
        }
        .resume-viewer {
            width: 100%;
            height: 70vh; /* Adjusted height */
            border: 2px solid #BE93FD; /* Accent purple border */
            border-radius: 5px;
            margin-bottom: 25px;
            background-color: #FFF; /* Keep PDF background white for readability if PDF is standard */
        }
        .actions {
            text-align: center;
            margin-bottom: 20px;
        }
        .actions button, .actions a {
            background-color: #BE93FD; /* Accent Purple from card */
            color: #1A0B2E; /* Dark purple text for contrast on button */
            border: none;
            padding: 12px 25px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1em;
            font-weight: 700;
            margin: 8px 5px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .actions button:hover, .actions a:hover {
            background-color: #A070D0; /* Darker shade of accent purple for hover */
            transform: translateY(-2px);
        }
        .footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            font-size: 0.9em;
            color: #aaa; /* Dimmed color for footer */
        }
        /* Basic responsive adjustments */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            .header p.subtitle {
                font-size: 1em;
            }
            .resume-viewer {
                height: 60vh;
            }
        }
        @media (max-width: 600px) {
            .actions button, .actions a {
                display: block;
                width: 80%;
                margin: 10px auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Joachim Rayski</h1>
            <p class="subtitle">Multi-Skilled Support Specialist</p>
        </div>

        <!-- PDF Viewer -->
        <iframe src="Resume.pdf" class="resume-viewer" title="Joachim Rayski Resume">
            <p>Your browser does not support PDFs. Please download the PDF to view it.</p>
        </iframe>

        <!-- Action Buttons -->
        <div class="actions">
            <a href="Resume.pdf" target="_blank" title="View PDF in a new tab">View Fullscreen</a>
            <a href="Resume.pdf" download="Resume.pdf" title="Download PDF">Download PDF</a>
            <button id="shareButton" title="Copy link to clipboard">Share Link</button>
        </div>
    </div>

    <footer class="footer">
        <p>© <span id="currentYear"></span> Joachim Rayski. All rights reserved.</p>
    </footer>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        const shareButton = document.getElementById('shareButton');
        shareButton.addEventListener('click', () => {
            const urlToShare = window.location.href;
            navigator.clipboard.writeText(urlToShare).then(() => {
                alert('Link copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy link: ', err);
                // Fallback for older browsers or if clipboard API fails
                prompt("Could not copy automatically. Please copy this link:", urlToShare);
            });
        });
    </script>
</body>
</html>
