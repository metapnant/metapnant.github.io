<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METAPNANT - Explore</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:ital,wght@0,400;0,600;0,700;1,700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --name-color: #9800eb;
      --title-color: #ded4eb;
      --background-main: #0d0022;
      --primary-text-color: #f0f0f0;
      --secondary-text-color: #a09cb8;
      --arrow-color: rgba(222, 212, 235, 0.4);
    }

    html { background-color: var(--background-main); }

    body {
      font-family: "Zilla Slab", serif;
      margin: 0;
      padding: 20px;
      padding-bottom: 160px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      color: var(--primary-text-color);
      background-color: var(--background-main);
      background: linear-gradient(135deg, #0b001f, #180033, #0d0022, #1c003a, #0b001f);
      background-size: 600% 600%;
      animation: darkShift 30s ease infinite;
      overflow-x: hidden;
    }

    @keyframes darkShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .explore-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      flex-grow: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1.2s ease, transform 1s ease;
    }

    body.loaded .explore-container { opacity: 1; transform: translateY(0); }

    .explore-header { text-align: center; margin-bottom: 30px; }

    .explore-header h1 {
      color: var(--name-color);
      font-size: 2.8em;
      font-style: italic;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .pdf-container {
      position: relative;
      background-color: rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 400px;
      padding: 10px;
      gap: 15px;
    }

    .pdf-page-wrapper {
      position: relative;
      margin: 0 auto;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
      background: linear-gradient(to bottom, transparent 99%, var(--background-main) 99.5%);
      line-height: 0;
      /* Improve scroll performance */
      will-change: transform;
    }

    .pdf-page-wrapper::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0) 30%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0) 70%);
      background-size: 200% 200%;
      /* Removed 'fixed' attachment to fix mobile scroll jitter */
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: overlay;
    }

    .pdf-page-canvas {
      width: 100%;
      height: auto;
      display: block;
      background-color: #fff;
      clip-path: inset(0 3px 2px 0);
    }

    /* --- CONTROLS --- */
    .nav-controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 80px;
      z-index: 2000;
      /* Remove tap highlight on mobile */
      -webkit-tap-highlight-color: transparent;
    }

    .nav-arrow {
      background: none;
      border: none;
      color: var(--arrow-color);
      font-size: 3.5rem;
      cursor: pointer;
      transition: color 0.2s, transform 0.1s;
      animation: faintFlash 5s infinite ease-in-out;
      user-select: none;
      -webkit-user-select: none;
    }

    .nav-arrow.disabled {
      opacity: 0.1;
      pointer-events: none;
    }

    /* FIX: Only apply hover effects on devices with a mouse */
    @media (hover: hover) {
      .nav-arrow:hover {
        color: var(--name-color);
        transform: scale(1.2);
      }
    }

    /* FIX: Active state for mobile tap feedback */
    .nav-arrow:active {
      color: var(--name-color);
      transform: scale(0.9);
    }

    .pdf-button {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 1000;
      background-color: transparent;
      color: var(--arrow-color);
      border: 1px solid var(--arrow-color);
      border-radius: 0;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 22px;
      font-size: 0.8em;
      letter-spacing: 1px;
      opacity: 0;
      transition: all 0.3s ease;
      animation: faintFlash 5s infinite ease-in-out;
      -webkit-tap-highlight-color: transparent;
    }

    body.loaded .pdf-button { opacity: 1; }

    /* FIX: Mouse hover only */
    @media (hover: hover) {
      .pdf-button:hover {
        color: var(--name-color);
        border-color: var(--name-color);
        background-color: rgba(152, 0, 235, 0.05);
        animation: none;
        opacity: 1;
      }
    }

    /* FIX: Mobile tap feedback */
    .pdf-button:active {
      background-color: rgba(152, 0, 235, 0.2);
      border-color: var(--name-color);
      color: var(--name-color);
    }

    @media (max-width: 599px) {
      .pdf-button {
        width: 50px; height: 50px;
        padding: 0;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.4em;
        border-color: var(--name-color);
        background-color: rgba(13, 0, 34, 0.8);
      }
      .pdf-button .btn-text { display: none; }
    }

    #song-link-container {
      transition: opacity 0.8s ease, visibility 0.8s;
      display: inline-block;
      margin-top: 10px;
    }

    #song-link {
      color: var(--name-color);
      text-decoration: underline;
      text-decoration-color: var(--name-color);
      text-underline-offset: 2px;
      font-weight: 600;
      transition: color 0.1s;
    }

    /* FIX: Mouse hover only for link */
    @media (hover: hover) {
      #song-link:hover {
        animation: strobe 0.4615s infinite;
      }
    }

    @keyframes strobe {
      0%, 100% { color: var(--name-color); text-decoration-color: var(--name-color); }
      50% { color: #ffffff; text-decoration-color: #ffffff; }
    }
    
    @keyframes faintFlash {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--name-color);
      border-radius: 50%;
      animation: spin 1s infinite linear;
      margin: 40px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      padding: 20px 0 10px 0;
      font-size: 0.85em;
      color: var(--secondary-text-color);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <div class="explore-container">
    <header class="explore-header">
      <h1 id="doc-title">METAPNANT</h1>
    </header>

    <main>
      <div class="pdf-container" id="pdf-wrapper">
        <div id="loading-message">
          <div class="loading-spinner"></div>
          <span>Loading Archive...</span>
        </div>
      </div>
    </main>
  </div>

  <nav class="nav-controls">
    <button class="nav-arrow" id="prev-doc">‹</button>
    <button class="nav-arrow" id="next-doc">›</button>
  </nav>

  <a href="#" target="_blank" class="pdf-button" id="download-btn">
    <span class="btn-icon">📖</span> <span class="btn-text">FULLSCREEN / DOWNLOAD</span>
  </a>

  <footer class="footer">
    <p><span id="currentYear"></span> Tef Riin ∞</p>
    <div id="song-link-container">
      <a href="#" id="song-link" target="_blank">In Love With</a>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const library = [
      { 
        title: "METAPNANT", 
        url: "A%20Story%20of%20Mirthful%20Reflection.pdf",
        songUrl: "https://www.youtube.com/watch?v=MEPqb4DuCD8" 
      },
      { 
        title: "THE REMINDER", 
        url: "The%20Reminder.pdf",
        songUrl: null 
      },
      { 
        title: "PHOENIX NEST", 
        url: "The%20Phoenix%20Nest.pdf",
        songUrl: "https://soundcloud.com/metapnant/in-love-with"
      }
    ];

    let currentIndex = 0;
    let pdfDoc = null;
    let isLoading = false;

    const pdfWrapper = document.getElementById('pdf-wrapper');
    const docTitle = document.getElementById('doc-title');
    const downloadBtn = document.getElementById('download-btn');
    const songContainer = document.getElementById('song-link-container');
    const songLink = document.getElementById('song-link');
    const prevArrow = document.getElementById('prev-doc');
    const nextArrow = document.getElementById('next-doc');

    async function loadDocument(index) {
      if (isLoading) return;
      isLoading = true;
      prevArrow.classList.add('disabled');
      nextArrow.classList.add('disabled');

      const loadingMsg = document.getElementById('loading-message');
      loadingMsg.style.display = 'block';
      
      const existingPages = document.querySelectorAll('.pdf-page-wrapper');
      existingPages.forEach(p => p.remove());

      currentIndex = index;
      const currentDoc = library[currentIndex];
      docTitle.textContent = currentDoc.title;
      const finalUrl = currentDoc.url + '?t=' + new Date().getTime();
      downloadBtn.href = finalUrl;

      if (currentDoc.songUrl) {
        songLink.href = currentDoc.songUrl;
        songContainer.style.opacity = "1";
        songContainer.style.visibility = "visible";
      } else {
        songContainer.style.opacity = "0";
        songContainer.style.visibility = "hidden";
      }

      try {
        pdfDoc = await pdfjsLib.getDocument(finalUrl).promise;
        for (let i = 1; i <= pdfDoc.numPages; i++) {
          await renderPage(i);
          if (i === 1) {
            loadingMsg.style.display = 'none';
            document.body.classList.add("loaded");
          }
        }
      } catch (err) {
        loadingMsg.innerHTML = "Archive unavailable.";
      } finally {
        isLoading = false;
        prevArrow.classList.remove('disabled');
        nextArrow.classList.remove('disabled');
      }
    }

    async function renderPage(num) {
      const page = await pdfDoc.getPage(num);
      const wrapper = document.createElement('div');
      wrapper.className = 'pdf-page-wrapper';
      const canvas = document.createElement('canvas');
      canvas.className = 'pdf-page-canvas';
      wrapper.appendChild(canvas);
      pdfWrapper.appendChild(wrapper);

      const ctx = canvas.getContext('2d');
      const viewport = page.getViewport({ scale: 1 });
      const desiredScale = (pdfWrapper.clientWidth - 40) / viewport.width;
      const finalScale = Math.min(Math.max(desiredScale, 0.6), 2.5);
      const outputScale = Math.min(window.devicePixelRatio || 1, 2.0);
      const scaledViewport = page.getViewport({ scale: finalScale * outputScale });

      canvas.height = scaledViewport.height;
      canvas.width = scaledViewport.width;
      await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
    }

    document.getElementById('next-doc').addEventListener('click', () => {
      if(isLoading) return;
      let next = (currentIndex + 1) % library.length;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      loadDocument(next);
    });

    document.getElementById('prev-doc').addEventListener('click', () => {
      if(isLoading) return;
      let prev = (currentIndex - 1 + library.length) % library.length;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      loadDocument(prev);
    });

    document.getElementById("currentYear").textContent = new Date().getFullYear();
    loadDocument(0);

    // FIX: Only re-render if WIDTH changes (ignore address bar vertical resizing)
    let lastWidth = window.innerWidth;
    let resizeTimeout;
    window.addEventListener('resize', () => {
      if (window.innerWidth === lastWidth) return; // Vertical scroll/address bar check
      lastWidth = window.innerWidth;
      
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        if(!isLoading) loadDocument(currentIndex);
      }, 500);
    });
  </script>
</body>
</html>
