<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <meta name="theme-color" content="#0d0022">
  <title>THE LIBRARY</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- MODULAR CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/music.css">
  <link rel="stylesheet" href="css/terminal.css">
</head>

<body>
  
  <!-- NAVIGATION HUD -->
  <nav class="nav-controls" aria-label="Document Navigation">
    <button class="nav-arrow" id="prev-doc" aria-label="Previous Document">‹</button>
    <button class="nav-arrow" id="next-doc" aria-label="Next Document">›</button>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="explore-container">
    <header class="explore-header">
      <h1 id="doc-title">METAPNANT</h1>
    </header>
    <main>
      <div class="pdf-container" id="pdf-wrapper">
        <div id="loading-overlay">
           <div class="loading-spinner"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- PDF TOOLS -->
  <div id="pdf-tools" class="pdf-tools" aria-expanded="false">
    <div id="tools-toggle" class="tools-toggle" aria-label="Toggle PDF Menu">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
    </div>
    <div class="tool-content">
        <a href="#" target="_blank" class="tool-btn" id="download-btn"><span class="btn-text">VIEW PDF</span></a>
    </div>
  </div>

  <!-- AUDIO SECTION -->
  <section id="music-section">
    <div class="music-container">
        <div class="art-column">
            <div class="album-art-wrapper">
                <img src="music/cover.jpg" alt="Chrysalis Cover" id="album-art">
                <div class="vinyl-shine"></div>
            </div>
            <button id="btn-show-voice" class="voice-btn">SHOW VOICE</button>
        </div>
        
        <div class="player-controls">
            <div class="track-details">
                <h2 id="track-title">--</h2>
                <h3 id="track-artist">Tef Riin - Chrysalis</h3>
            </div>
            <div class="progress-area" id="progress-container" role="slider">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="time-marker">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
            
            <div class="buttons">
                <button id="btn-prev" class="ctrl-btn"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M19 20L9 12L19 4V20Z" fill="currentColor"/><rect x="5" y="4" width="2" height="16" fill="currentColor"/></svg></button>
                <button id="btn-play" class="ctrl-btn play-btn">
                    <svg id="icon-play" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 5V19L19 12L8 5Z" fill="currentColor"/></svg>
                    <svg id="icon-pause" style="display:none;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>
                </button>
                <button id="btn-next" class="ctrl-btn"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 4L15 12L5 20V4Z" fill="currentColor"/><rect x="17" y="4" width="2" height="16" fill="currentColor"/></svg></button>
                
                <div class="utility-btns">
                    <button id="btn-audio-download" class="ctrl-btn download-btn" title="Download Current Track">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 4V20M5 13L12 20L19 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button id="btn-loop" class="ctrl-btn loop-btn" title="Toggle Loop Mode">
                        <svg id="icon-loop-all" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17 17H7V14L3 18L7 22V19H19V13H17V17Z" fill="currentColor"/><path d="M7 7H17V10L21 6L17 2V5H5V11H7V7Z" fill="currentColor"/></svg>
                        <svg id="icon-loop-one" style="display:none;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17 17H7V14L3 18L7 22V19H19V13H17V17Z" fill="currentColor" fill-opacity="0.5"/><path d="M7 7H17V10L21 6L17 2V5H5V11H7V7Z" fill="currentColor" fill-opacity="0.5"/><text x="12" y="15" fill="currentColor" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">1</text></svg>
                    </button>
                </div>
            </div>
            
            <div class="playlist-container"><ul id="playlist-list"></ul></div>
        </div>
    </div>
  </section>

  <footer class="footer">
    <p><span id="currentYear"></span> Tef Riin <span id="infinity-symbol" tabindex="0">∞</span></p>
    <div id="song-link-container"><a href="#" id="song-link" target="_blank"></a></div>
  </footer>

  <!-- TERMINAL -->
  <div id="secret-overlay">
    <div class="terminal-sidebar">
      <div class="cycles-wrapper">
          <div class="sidebar-header">CYCLES</div>
          <button class="cycle-btn theme-crash" id="btn-cycle-00" onclick="switchTab('crash')">[ -1 ] EARTH_PRIME</button>
          <button class="cycle-btn theme-echo" id="btn-cycle-echo" onclick="switchTab('echo')">[ ≈ ] THE_ECHO</button>
          <button class="cycle-btn theme-wake" id="btn-cycle-01" onclick="switchTab('wake')">[ +1 ] PHOENIX_NEST</button>
          <button class="cycle-btn theme-bloom" id="btn-cycle-bloom" onclick="switchTab('bloom')">[ * ] THE_BLOOM</button>
          <button class="cycle-btn theme-gardener" id="btn-cycle-02" onclick="switchTab('gardener')">[ 0 ] THE_GARDENER</button>
      </div>
      <div class="controls-wrapper">
          <div class="control-row-split">
              <button class="cycle-btn" id="btn-turbo" onclick="toggleTurbo()">[>>]<br>TURBO: OFF</button>
              <button class="cycle-btn" id="btn-mute" onclick="toggleMute()">[VOL: ON]</button>
          </div>
          <button class="cycle-btn" id="btn-reset" onclick="hardReset()">[ ! ] SYSTEM_RESET</button>
      </div>
    </div>

    <div class="terminal-wrapper">
      <button class="close-terminal" onclick="closeTerminal()">[ _ ] MINIMIZE</button>
      <div class="terminal-container" id="terminal-content">
        <div id="log-crash" class="log-section"></div>
        <div id="log-echo" class="log-section"></div>
        <div id="log-wake" class="log-section"></div>
        <div id="log-bloom" class="log-section"></div>
        <div id="log-gardener" class="log-section"></div>
      </div>
    </div>
  </div>

  <!-- PDF.JS ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  
  <!-- MODULAR JS SYSTEM -->
  <script src="js/core.js"></script>     
  <script src="js/data.js"></script>     
  <script src="js/pdf.js"></script>      
  <script src="js/audio.js"></script>    
  <script src="js/terminal.js"></script> 
  <script src="js/init.js"></script>     
</body>
</html>
