<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joachim Rayski - Creative Endeavors</title>
    <!-- Favicon -->
    <link rel="icon" href="favicon.png" type="image/png">
    <!-- Google Fonts: Zilla Slab -->
    <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet">
    <style>
        /* Reuse some CSS Variables from index.html for consistency */
        :root {
            --name-color: #8541FF;
            --title-color: #DED4EB;
            --background-main: #0D0022;
            --primary-text-color: #F0F0F0;
            --secondary-text-color: #A09CB8;
            --pure-white: #FFFFFF;
            --pure-black: #000000;
        }

        body {
            font-family: 'Zilla Slab', serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-main);
            color: var(--primary-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 90%;
            max-width: 900px;
            padding: 20px;
            margin-top: 30px; /* Space from top */
            margin-bottom: 30px; /* Space from bottom */
            text-align: center;
        }

        h1 {
            color: var(--name-color);
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        h1 a.back-link { /* Style for the back link */
            font-size: 0.6em;
            vertical-align: middle;
            margin-left: 15px;
            text-decoration: none;
            color: var(--title-color);
            border: 1px solid var(--title-color);
            padding: 5px 10px;
            border-radius: 15px;
            transition: background-color 0.3s, color 0.3s;
        }
        h1 a.back-link:hover {
            background-color: var(--title-color);
            color: var(--background-main);
        }


        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: var(--title-color);
            margin-bottom: 30px;
        }

        .creative-showcase {
            /* Add styles for your creative content layout here */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .creative-item img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 2px solid var(--name-color); /* Example border */
            margin-bottom: 10px;
        }
        .creative-item h2 {
            color: var(--title-color);
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        .creative-item p {
            font-size: 1em;
            color: var(--secondary-text-color);
        }

        .footer { /* Consistent footer */
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-size: 0.85em;
            color: var(--secondary-text-color);
            margin-top: auto; /* Pushes footer to the bottom */
        }

        /* Responsive adjustments */
        @media (min-width: 600px) {
            h1 {
                font-size: 2.8em;
            }
            .creative-showcase {
                /* Example: could go to a grid layout on larger screens */
                /* flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-around; */
            }
            .creative-item {
                /* max-width: 45%; */ /* For a two-column grid, for example */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Creative Side <a href="index.html" class="back-link">« Back to Resume</a></h1>
        <p>Here's a glimpse into some of my other interests and projects.</p>

        <div class="creative-showcase">
            <!-- Example Item 1: Featuring design.png -->
            <div class="creative-item">
                <!-- IMPORTANT: Ensure 'design.png' is in your repository -->
                <img src="design.png" alt="A cool design project">
                <h2>Project Title / Concept Name</h2>
                <p>A short description of this creative endeavor. What is it? What tools or skills did you use? What was the inspiration?</p>
            </div>

            <!-- Example Item 2 (Add more as needed) -->
            <!--
            <div class="creative-item">
                <img src="another-image.png" alt="Another creative project">
                <h2>Another Awesome Thing</h2>
                <p>Description for the second item...</p>
            </div>
            -->
        </div>
    </div>

    <footer class="footer">
        <p>© <span id="currentYear"></span> Joachim Rayski. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
